
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immigration Border Control System</title>
    <style>
        /* CSS styling for a clean, professional, terminal-like database look */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #eef2f5;
            color: #333;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #1a252f;
            color: #fff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }
        .container {
            padding: 20px;
            max-width: 1400px;
            margin: auto;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            background: #fff;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        input[type="text"] {
            width: 400px;
            padding: 10px;
            font-size: 1rem;
            border: 1px solid #bdc3c7;
            border-radius: 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        th, td {
            padding: 12px 15px;
            border-bottom: 1px solid #ecf0f1;
            text-align: left;
            font-size: 0.9rem;
        }
        th {
            background-color: #2c3e50;
            color: #fff;
            position: sticky;
            top: 0;
        }
        tr:hover {
            background-color: #f9fbfd;
        }
        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.85rem;
        }
        .btn-process { background-color: #3498db; color: white; }
        .btn-process:hover { background-color: #2980b9; }
        
        .status-approved { color: #27ae60; font-weight: bold; }
        .status-denied { color: #c0392b; font-weight: bold; }
        .status-pending { color: #f39c12; font-weight: bold; }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
        }
        .modal-content {
            background: #fff;
            width: 700px;
            margin: 5% auto;
            border-radius: 5px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .modal-header {
            background: #2c3e50;
            color: #fff;
            padding: 15px 20px;
            font-size: 1.2rem;
            display: flex;
            justify-content: space-between;
        }
        .close-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .modal-body {
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .data-group {
            margin-bottom: 10px;
        }
        .data-group label {
            display: block;
            font-size: 0.8rem;
            color: #7f8c8d;
            text-transform: uppercase;
        }
        .data-group div {
            font-size: 1rem;
            font-weight: 500;
        }
        .full-width {
            grid-column: span 2;
        }
        .action-area {
            padding: 20px;
            background: #ecf0f1;
            text-align: right;
            border-top: 1px solid #bdc3c7;
        }
        .btn-approve { background-color: #27ae60; color: white; padding: 10px 20px; font-size: 1rem; margin-left: 10px; }
        .btn-deny { background-color: #c0392b; color: white; padding: 10px 20px; font-size: 1rem; margin-left: 10px; }
        
        .deny-reason-area {
            display: none;
            text-align: left;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px dashed #bdc3c7;
        }
        .deny-reason-area textarea {
            width: 100%;
            height: 80px;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #bdc3c7;
            border-radius: 3px;
            resize: none;
        }
        .btn-confirm-deny { background-color: #000; color: white; padding: 10px 20px; font-size: 1rem; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <h1>BORDER IMMIGRATION DATABASE - TERMINAL 1</h1>
        <div id="clock">Current Time: --:--</div>
    </header>

    <div class="container">
        <div class="controls">
            <input type="text" id="searchInput" onkeyup="searchDatabase()" placeholder="Search by Name, Passport, or Visa Number...">
            <div><strong>Active Records: 100</strong></div>
        </div>

        <table id="dbTable">
            <thead>
                <tr>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Passport No.</th>
                    <th>Visa Exception</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

    <div id="processModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="modalTitle">Passenger Review</span>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalContent">
                </div>
            <div class="action-area">
                <div id="standardActions">
                    <button class="btn btn-deny" onclick="showDenyReason()">DENY ENTRY</button>
                    <button class="btn btn-approve" onclick="approveEntry()">ALLOW ENTRY</button>
                </div>
                
                <div id="denyArea" class="deny-reason-area">
                    <label style="color:#c0392b; font-weight:bold;">Reason for Denial:</label>
                    <textarea id="denyReasonInput" placeholder="Enter official reason for entry denial..."></textarea>
                    <div style="text-align: right;">
                        <button class="btn btn-confirm-deny" onclick="confirmDenial()">CONFIRM DENIAL</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- DATA GENERATOR (Creates exactly 100 profiles matching all specific constraints) ---
        const firstNames = ["James", "Maria", "John", "Wei", "Anna", "Omar", "Sophia", "David", "Emma", "Liam", "Fatima", "Carlos", "Yuki", "Chloe"];
        const lastNames = ["Smith", "Garcia", "Kim", "Patel", "Muller", "Singh", "Wang", "Ivanov", "Silva", "Kowalski", "Ali", "Tremblay"];
        const genders = ["M", "F"];
        const database = [];

        function getRandomDate(start, end) {
            return new Date(start.getTime() + Math.random() * (end.getTime() - start.getTime()));
        }

        function formatDate(date) {
            return date.toISOString().split('T')[0];
        }

        for (let i = 0; i < 100; i++) {
            let isDiplomatic = Math.random() < 0.15; // 15% chance of diplomatic visa
            
            // Generate Passport (Format ABC12345)
            let letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            let ppLetters = letters.charAt(Math.floor(Math.random() * 26)) + 
                            letters.charAt(Math.floor(Math.random() * 26)) + 
                            letters.charAt(Math.floor(Math.random() * 26));
            let ppNumbers = Math.floor(10000 + Math.random() * 90000);
            let passportNo = ppLetters + ppNumbers;

            // Passport Expiry (All AFTER June 2026)
            let ppExpiryDate = getRandomDate(new Date('2026-07-01'), new Date('2032-12-31'));

            // Visa Number (123456)
            let visaNumber = Math.floor(100000 + Math.random() * 900000).toString();

            // Visa Start (BEFORE 20 June 2026)
            let visaStartDate = getRandomDate(new Date('2024-01-01'), new Date('2026-06-19'));
            
            // Visa Expiry (After start date)
            let visaExpiryDate = getRandomDate(new Date('2026-06-25'), new Date('2028-12-31'));

            // Previous Visits Logic
            let numVisits = Math.floor(Math.random() * 4); // 0 to 3 visits
            let prevVisitsStr = "None";
            if (numVisits > 0) {
                let visitsArr = [];
                for (let v = 1; v <= numVisits; v++) {
                    let stayedDays = Math.floor(Math.random() * 60) + 1;
                    visitsArr.push(`${v}(visit number${v})${stayedDays}(${stayedDays} days stayed) Entry`);
                }
                prevVisitsStr = visitsArr.join("<br>");
            }

            database.push({
                id: i,
                firstName: firstNames[Math.floor(Math.random() * firstNames.length)],
                lastName: lastNames[Math.floor(Math.random() * lastNames.length)],
                dob: formatDate(getRandomDate(new Date('1950-01-01'), new Date('2005-12-31'))),
                gender: genders[Math.floor(Math.random() * genders.length)],
                passportNum: passportNo,
                passportExpiry: formatDate(ppExpiryDate),
                visaNum: visaNumber,
                visaStart: formatDate(visaStartDate),
                visaExpiry: formatDate(visaExpiryDate),
                visaType: isDiplomatic ? "Null" : (Math.random() > 0.5 ? "Single Entry" : "Multiple Entry"),
                visaDuration: isDiplomatic ? "Null" : (Math.random() > 0.5 ? "30 days" : "60 days"),
                visaException: isDiplomatic ? "Diplomatic" : "Normal",
                previousVisits: prevVisitsStr,
                status: "Pending", // Default system status
                denialReason: ""
            });
        }

        // --- APPLICATION LOGIC ---
        let currentProcessingId = null;

        function renderTable() {
            const tbody = document.getElementById("tableBody");
            tbody.innerHTML = "";
            
            database.forEach(row => {
                let statusClass = "status-pending";
                if (row.status === "Approved") statusClass = "status-approved";
                if (row.status === "Denied") statusClass = "status-denied";

                let tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${row.firstName}</td>
                    <td>${row.lastName}</td>
                    <td><strong>${row.passportNum}</strong></td>
                    <td>${row.visaException}</td>
                    <td class="${statusClass}">${row.status}</td>
                    <td>
                        <button class="btn btn-process" onclick="openModal(${row.id})">Review File</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function searchDatabase() {
            let input = document.getElementById("searchInput").value.toUpperCase();
            let table = document.getElementById("dbTable");
            let tr = table.getElementsByTagName("tr");

            for (let i = 1; i < tr.length; i++) { // Skip header row
                let textValue = tr[i].textContent || tr[i].innerText;
                if (textValue.toUpperCase().indexOf(input) > -1) {
                    tr[i].style.display = "";
                } else {
                    tr[i].style.display = "none";
                }
            }
        }

        function openModal(id) {
            currentProcessingId = id;
            const person = database.find(p => p.id === id);
            
            // Reset UI states
            document.getElementById("denyArea").style.display = "none";
            document.getElementById("standardActions").style.display = "block";
            document.getElementById("denyReasonInput").value = "";

            let htmlContent = `
                <div class="data-group">
                    <label>First Name</label>
                    <div>${person.firstName}</div>
                </div>
                <div class="data-group">
                    <label>Last Name</label>
                    <div>${person.lastName}</div>
                </div>
                <div class="data-group">
                    <label>Date of Birth</label>
                    <div>${person.dob}</div>
                </div>
                <div class="data-group">
                    <label>Gender</label>
                    <div>${person.gender}</div>
                </div>
                <div class="data-group">
                    <label>Passport Number</label>
                    <div style="color:#2980b9;">${person.passportNum}</div>
                </div>
                <div class="data-group">
                    <label>Passport Expiry</label>
                    <div>${person.passportExpiry}</div>
                </div>
                <div class="data-group">
                    <label>Visa Number</label>
                    <div>${person.visaNum}</div>
                </div>
                <div class="data-group">
                    <label>Visa Exception</label>
                    <div style="font-weight:bold; color:${person.visaException === 'Diplomatic' ? '#8e44ad' : '#333'}">${person.visaException}</div>
                </div>
                <div class="data-group">
                    <label>Visa Type</label>
                    <div>${person.visaType}</div>
                </div>
                <div class="data-group">
                    <label>Visa Duration</label>
                    <div>${person.visaDuration}</div>
                </div>
                <div class="data-group">
                    <label>Visa Start Date</label>
                    <div>${person.visaStart}</div>
                </div>
                <div class="data-group">
                    <label>Visa Expiry Date</label>
                    <div>${person.visaExpiry}</div>
                </div>
                <div class="data-group full-width">
                    <label>Previous Visits History</label>
                    <div style="background:#f9f9f9; padding:10px; border:1px solid #ddd; border-radius:3px; font-family:monospace;">
                        ${person.previousVisits}
                    </div>
                </div>
            `;

            // If already processed, show the reason and hide action buttons
            if (person.status !== "Pending") {
                document.getElementById("standardActions").style.display = "none";
                if(person.status === "Denied") {
                    htmlContent += `
                    <div class="data-group full-width" style="background:#fdedec; padding:10px; border-left:4px solid #e74c3c;">
                        <label style="color:#c0392b">Rejection Reason on File:</label>
                        <div>${person.denialReason}</div>
                    </div>`;
                } else {
                     htmlContent += `
                    <div class="data-group full-width" style="background:#eafaf1; padding:10px; border-left:4px solid #27ae60;">
                        <label style="color:#27ae60">Status:</label>
                        <div>Passenger Entry Authorized.</div>
                    </div>`;
                }
            }

            document.getElementById("modalContent").innerHTML = htmlContent;
            document.getElementById("processModal").style.display = "block";
        }

        function closeModal() {
            document.getElementById("processModal").style.display = "none";
        }

        function showDenyReason() {
            document.getElementById("standardActions").style.display = "none";
            document.getElementById("denyArea").style.display = "block";
        }

        function approveEntry() {
            const person = database.find(p => p.id === currentProcessingId);
            person.status = "Approved";
            closeModal();
            renderTable();
        }

        function confirmDenial() {
            const reason = document.getElementById("denyReasonInput").value;
            if (reason.trim() === "") {
                alert("You must enter a reason to deny entry.");
                return;
            }
            const person = database.find(p => p.id === currentProcessingId);
            person.status = "Denied";
            person.denialReason = reason;
            closeModal();
            renderTable();
        }

        // Live Clock
        setInterval(() => {
            document.getElementById("clock").innerText = "Current Time: " + new Date().toLocaleString();
        }, 1000);

        // Initial Render
        renderTable();
    </script>
</body>
</html>

```
