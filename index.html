<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Travel Verification Simulator</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f4f6f8;
}

header{
    background:#1f2d3a;
    color:white;
    padding:15px;
}

.container{
    padding:15px;
}

.search{
    width:100%;
    padding:10px;
    font-size:16px;
    margin-bottom:15px;
}

.card{
    background:white;
    padding:15px;
    border:1px solid #ddd;
}

.good{color:green;font-weight:bold;}
.bad{color:red;font-weight:bold;}
.mid{color:orange;font-weight:bold;}
.blue{color:#2b6cb0;font-weight:bold;}

button{
    padding:8px 12px;
    margin-right:5px;
    cursor:pointer;
}

.allow{background:#28a745;color:white;border:none;}
.deny{background:#dc3545;color:white;border:none;}
</style>
</head>

<body>

<header>
<h2>TRAVEL VERIFICATION SIMULATOR (FICTIONAL)</h2>
</header>

<div class="container">

<input class="search" id="searchBox" placeholder="Enter Document ID (e.g. DOC-000123)" onkeyup="search()">

<div id="result" class="card">
Enter an ID to retrieve traveler record.
</div>

</div>

<script>

let db={};

function rand(arr){return arr[Math.floor(Math.random()*arr.length)];}

const names=[
"James Carter","Olivia Brooks","Ethan Walker","Charlotte Reed",
"Benjamin Hayes","Sophia Turner","Lucas Mitchell","Emma Collins",
"Daniel Scott","Mia Johnson"
];

function riskCalc(p){
    let r=0;
    if(p.overstay) r+=40;
    if(p.visits>0) r+=20;
    if(p.expired) r+=30;
    return r;
}

function riskLabel(r){
    if(r>=60) return "HIGH";
    if(r>=30) return "MEDIUM";
    return "LOW";
}

function colorClass(r){
    if(r>=60) return "bad";
    if(r>=30) return "mid";
    return "good";
}

function generate(){

for(let i=1;i<=150;i++){

let visits=Math.floor(Math.random()*3);

let overstay=Math.random()<0.2;

let expired=Math.random()<0.1;

db["DOC-"+String(i).padStart(6,"0")] = {

id:"DOC-"+String(i).padStart(6,"0"),
name:rand(names),

dob:"199"+(i%9)+"-"+((i%12)+1).toString().padStart(2,"0")+"-1"+(i%9),

gender:i%2?"Male":"Female",

passportCountry:"Fictionland",

visaType: visits>0 ? "Multiple Entry" : "Single Entry",

visaDuration: visits>0 ? "60 Days" : "30 Days",

visaStatus:"Active",

passportExpiry: expired ? "2026-05-10":"2028-11-20",

visaExpiry: expired ? "2026-06-01":"2026-12-31",

visits:visits,

overstay:overstay,

risk:0,

notes:[
"Routine screening completed",
"No security alerts"
],

history:[
"Interview 1: Standard entry clearance",
"Interview 2: Border check completed"
],

status:"Pending"

};

db["DOC-"+String(i).padStart(6,"0")].risk =
riskCalc(db["DOC-"+String(i).padStart(6,"0")]);
}

}

function search(){

let id=document.getElementById("searchBox").value.trim();

let r=db[id];

let out=document.getElementById("result");

if(!r){
out.innerHTML="No record found.";
return;
}

out.innerHTML=`
<h3>${r.name}</h3>

<p><b>ID:</b> ${r.id}</p>
<p><b>DOB:</b> ${r.dob}</p>
<p><b>Gender:</b> ${r.gender}</p>

<p><b>Passport Country:</b> ${r.passportCountry}</p>
<p><b>Passport Expiry:</b> ${r.passportExpiry}</p>

<p><b>Visa Type:</b> ${r.visaType}</p>
<p><b>Visa Duration:</b> ${r.visaDuration}</p>
<p><b>Visa Expiry:</b> ${r.visaExpiry}</p>

<p><b>Previous Visits:</b> ${r.visits}</p>

<p><b>Risk Level:</b>
<span class="${colorClass(r.risk)}">
${riskLabel(r.risk)}
</span>
</p>

<p><b>Officer Notes:</b></p>
<ul>${r.notes.map(n=>`<li>${n}</li>`).join("")}</ul>

<p><b>Interview History:</b></p>
<ul>${r.history.map(h=>`<li>${h}</li>`).join("")}</ul>

<hr>

<button class="allow" onclick="allow('${r.id}')">ALLOW ENTRY</button>
<button class="deny" onclick="deny('${r.id}')">DENY ENTRY</button>

<br><br>
<textarea id="reason" placeholder="Denial reason..." style="width:100%;height:60px;"></textarea>

<p><b>Status:</b> ${r.status}</p>
`;

}

function allow(id){
db[id].status="Allowed";
search();
}

function deny(id){
let reason=document.getElementById("reason").value;
if(!reason) return alert("Enter reason");
db[id].status="Denied";
db[id].notes.push("Denied: "+reason);
search();
}

generate();

</script>

</body>
</html>
